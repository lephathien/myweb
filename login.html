<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #login-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        #login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 24px;
        }

        #login-form div {
            margin-bottom: 20px;
        }

        #login-form label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        #login-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #login-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #login-form button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #login-form button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #login-form button[type="submit"]:active {
            transform: translateY(0);
        }

        #logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        #logout-btn:hover {
            background: #ee5a52;
        }
    </style>
</head>

<body>
    <!-- Form đăng nhập -->
    <form id="login-form">
        <h2>Đăng nhập tài khoản</h2>
        <div>
            <label for="inp-email">Email:</label>
            <input type="email" id="inp-email" name="email" autocomplete="email" required>
        </div>
        <div>
            <label for="inp-pwd">Mật khẩu:</label>
            <input type="password" id="inp-pwd" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit">Đăng nhập</button>
    </form>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore-compat.js"></script>
    <script src="./configFirebase.js"></script>
    <script>
        const loginForm = document.querySelector("#login-form");
        const inpEmailLogin = document.querySelector("#inp-email");
        const inpPwdLogin = document.querySelector("#inp-pwd");
        //Đăng nhập với Firebase Auth
        function handleLogin(event) {
            event.preventDefault(); // Ngăn chặn hành vi mặc định của form
            let email = inpEmailLogin.value;
            let password = inpPwdLogin.value;
            // Kiểm tra các trường có trống không
            if (!email || !password) {
                alert("Vui lòng điền đủ các trường");
                return;
            }
            // Đăng nhập với Firebase Auth
            firebase
                .auth()
                .signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    var user = userCredential.user; // Lấy thông tin người dùng
                    alert("Đăng nhập thành công");
                    // Thiết lập phiên hoặc lưu thông tin đăng nhập
                    // Tạo đối tượng user session
                    const userSession = {
                        user: user,
                        expiry: new Date().getTime() + 2 * 60 * 60 * 1000, // 2 tiếng
                    };
                    // Lưu vào localStorage
                    localStorage.setItem(
                        "user_session",
                        JSON.stringify(userSession)
                    );
                    // Chuyển hướng tới trang chủ sau khi đăng nhập thành công
                    window.location.href = "./index.html";

                })
                .catch((error) => {
                    console.log("Lỗi đăng nhập:", error.message);
                    alert("Mật khẩu không đúng");
                });
        }
        loginForm.addEventListener("submit", handleLogin);

    </script>

</body>

</html>
